# ===================================================================
# Spring Boot configuration for the "dev" profile.
#
# This configuration overrides the application.yml file.
#
# More information on profiles: https://www.jhipster.tech/profiles/
# More information on configuration properties: https://www.jhipster.tech/common-application-properties/
# ===================================================================

# ===================================================================
# Standard Spring Boot properties.
# Full reference is available at:
# http://docs.spring.io/spring-boot/docs/current/reference/html/common-application-properties.html
# ===================================================================

logging:
  level:
    ROOT: DEBUG
    tech.jhipster: DEBUG
    org.hibernate.SQL: DEBUG
    com.gindevp.app: DEBUG

spring:
  docker:
    compose:
      # Dev uses local MySQL; Docker is optional (avoids failure when Docker CLI is not installed).
      enabled: false
  devtools:
    restart:
      enabled: true
      additional-exclude: static/**
    livereload:
      enabled: false
  jackson:
    serialization:
      indent-output: true
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql://localhost:3306/assetApp?useUnicode=true&characterEncoding=utf8&useSSL=false&useLegacyDatetimeCode=false&createDatabaseIfNotExist=true
    username: root
    password: 123456
    hikari:
      poolName: Hikari
      auto-commit: false
  liquibase:
    # Remove 'faker' if you do not want the sample data to be loaded automatically
    contexts: dev, faker
    clear-checksums: true
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations: classpath:config/sql/00_clear_liquibase_lock.sql
  # Gmail: bắt buộc SPRING_MAIL_USERNAME và SPRING_MAIL_PASSWORD (App Password 16 ký tự, không commit vào git).
  # Không chạy SMTP local: không dùng localhost:25 (Connection refused). Mặc định: smtp.gmail.com:587 + STARTTLS.
  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS:true}
            required: ${SPRING_MAIL_SMTP_STARTTLS:true}
  messages:
    cache-duration: PT1S # 1 second, see the ISO 8601 standard
  thymeleaf:
    cache: false

server:
  port: 8080
  # make sure requests the proxy uri instead of the server one
  forward-headers-strategy: native

# ===================================================================
# JHipster specific properties
#
# Full reference is available at: https://www.jhipster.tech/common-application-properties/
# ===================================================================

jhipster:
  # CORS is only enabled by default with the "dev" profile
  cors:
    # Allow Ionic for JHipster by default (* no longer allowed in Spring Boot 2.4+)
    allowed-origins: 'http://localhost:5173,http://127.0.0.1:5173,http://localhost:8100,https://localhost:8100'
    # Enable CORS when running in GitHub Codespaces
    allowed-origin-patterns: 'http://localhost:*,http://127.0.0.1:*,https://localhost:*,https://127.0.0.1:*,https://*.githubpreview.dev'
    allowed-methods: '*'
    allowed-headers: '*'
    exposed-headers: 'Authorization,Link,X-Total-Count,X-${jhipster.clientApp.name}-alert,X-${jhipster.clientApp.name}-error,X-${jhipster.clientApp.name}-params'
    allow-credentials: true
    max-age: 1800
  security:
    authentication:
      jwt:
        # This token must be encoded using Base64 and be at least 256 bits long (you can type `openssl rand -base64 64` on your command line to generate a 512 bits one)
        base64-secret: MTE3NDg1YzI0YjlmNGFmNjBmMWQ1YzhkNzlmMDAxZTU4N2VkOWU0NGRkY2JkM2FlMmU3NWM4NWI1N2Q5NzUwY2FkZGVlMGI1N2Y5MTJjNzlkMDM3Zjc5YmQ0M2FlMTJkZTJjMTg1MTczNWJmMjE5NTUwODA1MTYwODcxZjBjZmI=
        # Token is valid 24 hours
        token-validity-in-seconds: 86400
        token-validity-in-seconds-for-remember-me: 2592000
  mail: # specific JHipster mail property, for standard properties see MailProperties
    # URL gốc của SPA (link trong email: /account/reset/finish?key=...)
    base-url: ${JHIPSTER_MAIL_BASE_URL:http://127.0.0.1:5173}
    from: ${JHIPSTER_MAIL_FROM:${SPRING_MAIL_USERNAME:assetAppSer@localhost}}

application:
  liquibase:
    # Run synchronously in dev to avoid partial schema during startup/restart
    async-start: false
  mail:
    # false: gửi mail qua Gmail (cần spring.mail.username/password). true: chỉ log, không SMTP — khi chưa cấu mail.
    dry-run: ${APP_MAIL_DRY_RUN:false}
  logging:
    use-json-format: false # By default, logs are not in Json format
    logstash: # Forward logs to logstash over a socket, used by LoggingConfiguration
      enabled: false
      host: localhost
      port: 5000
      ring-buffer-size: 512
# ===================================================================
# Application specific properties
# Add your own application properties here, see the ApplicationProperties class
# to have type-safe configuration, like in the JHipsterProperties above
#
# More documentation is available at:
# https://www.jhipster.tech/common-application-properties/
# ===================================================================

# application:

# Cho phép FE dev (Vite) gọi REST không cần JWT — không bật trên production
app:
  security:
    # true: dev local không cần JWT (tránh bảng trống khi quên đăng nhập). Production dùng profile prod + JWT.
    # false: luôn cần đăng nhập /login trước (admin/admin).
    api-permit-all: true
